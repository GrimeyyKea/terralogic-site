<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthwork Volume Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-container">
        <header>
            <div class="header-top">
                <h1>Volume Calculator</h1>
                <button id="themeToggle" class="toggle-btn" aria-label="Toggle Field Mode">
                    <span class="toggle-icon">☀</span> <span class="toggle-text">Field Mode</span>
                </button>
            </div>
            <p>Calculate excavation, dirt work, or aggregate volumes accurately.</p>
        </header>

        <form id="volumeForm" onsubmit="return false;">
            <div class="input-grid">
                <div class="input-group">
                    <label for="length">Length (meters):</label>
                    <input type="number" id="length" step="any" placeholder="0.00" required>
                </div>
                
                <div class="input-group">
                    <label for="width">Width (meters):</label>
                    <input type="number" id="width" step="any" placeholder="0.00" required>
                </div>
                
                <div class="input-group">
                    <label for="depth">Average Depth (meters):</label>
                    <input type="number" id="depth" step="any" placeholder="0.00" required>
                </div>
            </div>

            <button type="button" id="calculateBtn" class="primary-btn">Calculate Volume</button>
        </form>

        <div id="resultsCard" class="results-card hidden">
            <h3>Calculated Excavation Material</h3>
            <div class="result-value">
                <span id="volumeResult">0.00</span> 
                <span class="unit">m³</span>
            </div>
            <p class="sub-result">Equivalent to approximately <span id="yardageResult">0.00</span> yd³ (cubic yards)</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
